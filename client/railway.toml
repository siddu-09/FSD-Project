# Railway config for the BookNest frontend (React/Vite static site)
# Uses a Dockerfile that builds with Vite then serves via Nginx

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
