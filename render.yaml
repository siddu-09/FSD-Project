# Render Blueprint Specification
# This file automates the deployment of the database, backend, and frontend.

services:
  # ── Backend Service ────────────────────────────────────────────────
  - type: web
    name: booknest-backend
    runtime: docker
    rootDir: server
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: booknest-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*" # Allow all origins initially; update to frontend URL later for security
      - key: NODE_ENV
        value: production

  # ── Frontend Service ───────────────────────────────────────────────
  - type: web
    name: booknest-frontend
    runtime: docker
    rootDir: client
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        # We use the predicted Render URL for the backend service.
        # Replace 'booknest-backend' if you rename the service above.
        value: https://booknest-backend.onrender.com/api

databases:
  # ── Managed PostgreSQL ─────────────────────────────────────────────
  - name: booknest-db
    databaseName: booknest
    user: booknest_user
    plan: free # Free tier expires after 90 days
